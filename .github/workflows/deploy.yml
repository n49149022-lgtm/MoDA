name: 🎬 Generate Talking Avatar (CPU)

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL изображения аватара (или оставь пустым для теста)'
        required: false
        default: ''

jobs:
  generate-avatar:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⬇️ Install PyTorch CPU first
        run: |
          pip install torch==2.1.0+cpu torchvision==0.16.0+cpu torchaudio==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: ⬇️ Install other dependencies (NO index flag)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1
          pip install -r requirements.txt

      - name: 🎬 Generate avatar
        run: |
          python src/models/inference/moda_test.py \
            --cfg_path configs/audio2motion/inference/inference.yaml \
            --image_path src/examples/reference_images/6.jpg \
            --audio_path src/examples/driving_audios/5.wav \
            --save_dir output/ \
            --motion_mean_std_path src/datasets/mean.pt

      - name: 📤 Upload result
        uses: actions/upload-artifact@v4
        with:
          name: talking-avatar
          path: output/
          retention-days: 7

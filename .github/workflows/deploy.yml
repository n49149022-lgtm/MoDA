name: 🎬 Generate Talking Avatar (CPU)

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL изображения аватара'
        required: false
        default: ''

jobs:
  generate-avatar:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⬇️ Install PyTorch 2.3.1+cpu
        run: |
          pip install torch==2.3.1+cpu torchvision==0.18.1+cpu torchaudio==2.3.1+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: 📥 Download ALL Model Weights (Fix LFS/404)
        run: |
          pip install -U huggingface_hub
          python - << 'PYEOF'
          import os
          from huggingface_hub import hf_hub_download

          # Список всех критичных весов из конфига и кода
          weights = [
              "pretrain_weights/moda/net-200.pth",
              "pretrain_weights/decode/v1/first_stage/base_models/appearance_feature_extractor.pth",
              "pretrain_weights/decode/v1/first_stage/base_models/motion_extractor.pth",
              "pretrain_weights/decode/v1/first_stage/base_models/spade_generator.pth",
              "pretrain_weights/decode/v1/first_stage/base_models/warping_module.pth",
              "pretrain_weights/decode/v1/first_stage/retargeting_models/stitching_retargeting_module.pth",
              "src/datasets/mean.pt"
          ]

          for w in weights:
              os.makedirs(os.path.dirname(w), exist_ok=True)
              print(f"⬇️ Downloading {os.path.basename(w)}...")
              hf_hub_download(repo_id="TMElyralab/MoDA", filename=w, local_dir=".")
              print(f"✅ Saved: ./{w}")
          print("🎉 All weights ready.")
          PYEOF

      - name: ⬇️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1
          pip install -r requirements.txt

      - name: 🎬 Generate avatar
        run: |
          python src/models/inference/moda_test.py \
            --cfg_path configs/audio2motion/inference/inference.yaml \
            --image_path src/examples/reference_images/6.jpg \
            --audio_path src/examples/driving_audios/5.wav \
            --save_dir output/ \
            --motion_mean_std_path src/datasets/mean.pt

      - name: 📤 Upload result
        uses: actions/upload-artifact@v4
        with:
          name: talking-avatar
          path: output/
          retention-days: 7

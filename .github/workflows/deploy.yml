name: 🎬 Generate Talking Avatar (CPU)

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL изображения аватара'
        required: false
        default: ''

jobs:
  generate-avatar:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⬇️ Install PyTorch 2.3.1+cpu
        run: |
          pip install torch==2.3.1+cpu torchvision==0.18.1+cpu torchaudio==2.3.1+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: 📥 Download ALL Weights from OFFICIAL Repo
        run: |
          pip install -U huggingface_hub
          python - << 'PYEOF'
          from huggingface_hub import snapshot_download
          import os
          
          REPO_ID = "lixinyizju/moda"
          WEIGHTS_DIR = "pretrain_weights"
          
          print(f"⬇️ Downloading ALL weights from {REPO_ID}...")
          print("This may take 3-5 minutes (~500MB)")
          
          snapshot_download(
              repo_id=REPO_ID,
              local_dir=WEIGHTS_DIR,
              local_dir_use_symlinks=False,
              resume_download=True,
          )
          
          # Verify critical files
          critical_files = [
              "moda/net-200.pth",
              "decode/v1/first_stage/base_models/appearance_feature_extractor.pth",
              "decode/v1/first_stage/base_models/motion_extractor.pth",
              "decode/v1/first_stage/base_models/spade_generator.pth",
          ]
          
          print("\n📋 Verifying downloaded files:")
          for f in critical_files:
              full_path = os.path.join(WEIGHTS_DIR, f)
              if os.path.exists(full_path):
                  size_mb = os.path.getsize(full_path) / (1024*1024)
                  print(f"  ✅ {f} ({size_mb:.1f} MB)")
              else:
                  print(f"  ❌ MISSING: {f}")
          
          print("\n✅ Weights downloaded to ./pretrain_weights/")
          PYEOF

      - name: ⬇️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1
          pip install -r requirements.txt

      - name: 🎬 Generate avatar
        run: |
          python src/models/inference/moda_test.py \
            --cfg_path configs/audio2motion/inference/inference.yaml \
            --image_path src/examples/reference_images/6.jpg \
            --audio_path src/examples/driving_audios/5.wav \
            --save_dir output/ \
            --motion_mean_std_path src/datasets/mean.pt

      - name: 📤 Upload result
        uses: actions/upload-artifact@v4
        with:
          name: talking-avatar
          path: output/
          retention-days: 7
